{% extends "base.html" %}

{% block body %}
<div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center py-5">
    <div class="card shadow-sm p-4" style="width: 420px;">
        <h2 class="text-center h4 mb-3 text-dark">Create Event</h2>

        {% if form.errors %}
            <div class="alert alert-danger p-2 text-center small mb-3" role="alert">
                Please correct the errors below.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="{{ form.title.id_for_label }}" class="form-label">Title</label>
                {{ form.title }}
            </div>

            <div class="mb-3">
                <label for="{{ form.date.id_for_label }}" class="form-label">Date</label>
                {{ form.date }}
            </div>

            <div class="mb-3">
                <label for="{{ form.address.id_for_label }}" class="form-label">Address</label>
                {{ form.address }}
            </div>

            <div class="mb-3">
                <label for="{{ form.capacity.id_for_label }}" class="form-label">Capacity</label>
                {{ form.capacity }}
            </div>

            <div class="mb-3">
                <label for="{{ form.descr.id_for_label }}" class="form-label">Description</label>
                {{ form.descr }}
            </div>

            <button type="submit" class="btn btn-primary w-100">Create</button>
        </form>
    </div>
</div>
{% endblock body %}
