{% extends "base.html" %}

{% block body %}
<div class="container d-flex flex-column align-items-center justify-content-center py-5">
    <div class="col-12 col-md-8 col-lg-6">
        <h2 class="text-center mb-4 fw-bold text-dark">Modify Event</h2>
        <div class="card shadow-sm border-0 mb-4 bg-white">
            <div class="card-body p-4">
                <form method="post" action="">
                    {% csrf_token %}
                    <div class="mb-4 text-secondary">
                        {{ form.as_p }}
                    </div>

                    <div class="d-flex justify-content-between gap-3 border-top pt-3">
                        <a href="{% url 'event_detail' object.pk %}" class="btn btn-light border px-4 py-2 flex-grow-1 fw-medium text-secondary">
                            Cancel
                        </a>

                        <button type="submit" class="btn btn-primary px-4 py-2 flex-grow-1 shadow-sm fw-semibold">
                            <i class="bi bi-check-circle me-2"></i>Save Changes
                        </button>
                    </div>
                </form>

            </div>
        </div>

    </div>
</div>
{% endblock body %}
