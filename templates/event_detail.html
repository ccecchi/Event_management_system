{% extends "base.html" %}

{% block body %}
<div class="container min-vh-100 d-flex flex-column align-items-center justify-content-center py-5">
    <div class="col-12 col-md-8 col-lg-6">

        <h2 class="text-center mb-4 fw-bold text-dark">{{ object.title }}</h2>

        <div class="card shadow-sm border-0 mb-4 bg-white">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center small text-muted mb-3 border-bottom pb-2">
                    <span class="d-flex align-items-center">
                        <i class="bi bi-geo-alt-fill me-2 text-primary"></i>{{ object.address }}
                    </span>
                    <span class="d-flex align-items-center">
                        <i class="bi bi-calendar-event me-2 text-primary"></i>{{ object.date }}
                    </span>
                </div>

                <p class="card-text text-secondary lh-base mb-4">
                    {{ object.descr }}
                </p>

                {% if user.is_organizer %}
                <div class="text-center">
                    <a href="#" class="btn btn-primary w-100 py-2 shadow-sm fw-semibold">
                        <i class="bi bi-people-fill me-2"></i>See registrations
                    </a>
                </div>
                {% else %}
                <div class="text-center">
                    <a href="{% url 'new_registration' object.pk %}" class="btn btn-primary w-100 py-2 shadow-sm fw-semibold">
                        <i class="bi bi-people-fill me-2"></i>Register
                    </a>
                </div>
                {% endif %}
            </div>
        </div>

        {% if user.is_organizer %}
        <div class="d-flex justify-content-between gap-3">
            <a href="{% url 'event_delete' object.pk %}" class="btn btn-outline-danger px-4 py-2 flex-grow-1 shadow-sm fw-medium">
                <i class="bi bi-trash3 me-2"></i>Delete
            </a>
            <a href="{% url 'event_edit' object.pk %}" class="btn btn-secondary px-4 py-2 flex-grow-1 shadow-sm fw-medium">
                <i class="bi bi-pencil-square me-2"></i>Modify
            </a>
        </div>
        {% endif %}

    </div>
</div>
{% endblock body %}
