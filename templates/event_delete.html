{% extends "base.html" %}

{% block body %}
<div class="container min-vh-100 d-flex flex-column align-items-center justify-content-center py-5">
    <div class="col-12 col-md-8 col-lg-6">
        
        <!-- Main Confirmation Card -->
        <div class="card shadow-sm border-0 mb-4 bg-white">
            <div class="card-body p-4 text-center">
                
                <!-- Warning Icon -->
                <div class="text-danger mb-3">
                    <i class="bi bi-exclamation-triangle-fill display-4"></i>
                </div>
                
                <!-- Title & Warning Message -->
                <h3 class="fw-bold text-dark mb-2">Delete Event?</h3>
                <p class="text-secondary mb-4">
                    Are you sure you want to permanently delete <strong>"{{ object.title }}"</strong>? This action cannot be undone.
                </p>

                <!-- Form for Submission -->
                <form method="POST">
                    {% csrf_token %} <!-- If using Django/Flask, keep this. Otherwise, feel free to remove. -->
                    
                    <div class="d-flex justify-content-between gap-3">
                        
                        <a href="{% url 'event_detail' object.pk %}" class="btn btn-light border px-4 py-2 flex-grow-1 fw-medium text-secondary">
                            Cancel
                        </a>
                        
                        <!-- Actual Confirm Delete Button -->
                        <button type="submit" class="btn btn-danger px-4 py-2 flex-grow-1 shadow-sm fw-medium">
                            <i class="bi bi-trash3 me-2"></i>Permanently Delete
                        </button>
                    </div>
                </form>
                
            </div>
        </div>

    </div>
</div>
{% endblock body %}
