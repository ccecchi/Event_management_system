{% extends "base.html"%}

{% block body %}
<div class="d-flex justify-content-center align-items-center pt-5" style="min-height: 70vh;">
    <div class="card shadow-sm p-4" style="width: 320px;">
        <h2 class="text-center h4 mb-3 text-dark">Login</h2>
        
        {% if form.errors %}
            <div class="alert alert-danger p-2 text-center small mb-3" role="alert">
                Please correct the errors below.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label text-muted small fw-medium">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type|default:'text' }}" 
                           name="{{ field.html_name }}" 
                           id="{{ field.id_for_label }}" 
                           class="form-control" 
                           value="{{ field.value|default:'' }}">
                    {% if field.errors %}
                        <div class="text-danger small mt-1">
                            {{ field.errors|striptags }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary w-100 mt-2">Log In</button>
        </form>
    </div>
</div>
{% endblock body%}
